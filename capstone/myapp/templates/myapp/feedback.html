{% extends "base.html" %}

<!-- Title -->
{% block title %} Feedback Page {% endblock %}

<!-- Content -->
{% block content %}
<h1>Feedback Form</h1>
<form method="POST">
  {% csrf_token %} {% for field in form %}
  <div class="form-control {% if field.errors %} errors {% endif %}">
    {{ field.label_tag }} {{ field }} {{ field.errors }}
  </div>
  {% endfor %}
  <button type="submit">Send</button>
</form>
{% endblock %}
